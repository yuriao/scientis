# ── Scientis — Local Development Infrastructure ────────────────────────────
# Start with:  docker compose up -d
# Stop with:   docker compose down

services:
  # ── PostgreSQL (metadata, jobs, audit) ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: scientis
      POSTGRES_PASSWORD: scientis-dev
      POSTGRES_DB: scientis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scientis"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Neo4j (evidence graph + vector index) ───────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/scientis-dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "scientis-dev", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── MinIO (S3-compatible object storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (queues, caching) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  neo4j_data:
  neo4j_logs:
  minio_data:
