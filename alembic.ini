# Alembic configuration file
# Run migrations: alembic upgrade head
# Create a new revision: alembic revision --autogenerate -m "description"

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
file_template = %%(rev)s_%%(slug)s

# asyncpg requires the postgresql+asyncpg URL, but Alembic's sync runner
# needs a plain psycopg2 URL. Override via env var ALEMBIC_DATABASE_URL
# if you have psycopg2 available; otherwise the autogenerate env.py
# below handles async correctly.
sqlalchemy.url = postgresql+asyncpg://scientis:scientis-dev@localhost:5432/scientis

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
